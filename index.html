<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUBY — Cine sin distracciones</title>
  <meta name="description" content="RUBY: una selección curada de cine y series, sin ruido." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <a href="#main-content" class="skip-link visually-hidden">Saltar al contenido principal</a>

  <!-- ==================== NAVBAR ==================== -->
  <header class="navbar">
    <div class="navbar-inner">
      <a
        href="#"
        class="brand"
        data-brand-logo="assets/logo/logo.png"
        aria-label="RUBY, ir al inicio"
      >
        <span class="brand-mark" data-brand-wordmark>RUB<span>Y</span></span>
      </a>

      <nav class="nav-menu" aria-label="Navegación principal">
        <a href="index.html" class="is-current">Inicio</a>
        <a href="peliculas.html">Películas</a>
        <a href="series.html">Series</a>
        <a href="mi-lista.html">Mi Lista</a>
      </nav>

      <div class="navbar-actions">
        <form class="search-form" data-search-form>
          <input
            type="text"
            class="search-input"
            data-search-input
            placeholder="Buscar títulos, géneros…"
            aria-label="Buscar en RUBY"
          />
          <button
            type="button"
            class="search-trigger"
            data-search-trigger
            aria-expanded="false"
            aria-label="Abrir búsqueda"
          >
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.2" y2="16.2" />
            </svg>
          </button>
        </form>

        <div class="profile">
          <button
            type="button"
            class="profile-trigger"
            data-profile-trigger
            aria-expanded="false"
            aria-haspopup="true"
            aria-label="Cuenta de Usuario"
          >
            <span class="profile-avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="12" cy="8.2" r="3.4" />
                <path d="M4.6 19.4c1.15-3.65 3.95-5.7 7.4-5.7s6.25 2.05 7.4 5.7" />
              </svg>
            </span>
            <span class="profile-caret">&#9662;</span>
          </button>
          <div class="profile-menu" data-profile-menu role="menu">
            <a href="cuenta.html" class="profile-menu-header" role="menuitem">
              <span class="profile-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <circle cx="12" cy="8.2" r="3.4" />
                  <path d="M4.6 19.4c1.15-3.65 3.95-5.7 7.4-5.7s6.25 2.05 7.4 5.7" />
                </svg>
              </span>
              <span class="profile-menu-name">Usuario</span>
            </a>
            <div class="profile-menu-divider"></div>
            <a href="mi-lista.html" role="menuitem">Mi Lista</a>
            <a href="cuenta.html" role="menuitem">Cuenta</a>
            <a href="#" role="menuitem" data-logout>Cerrar sesión</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <!-- ==================== HERO SLIDER ==================== -->
    <!-- Built entirely by Render.renderHeroSlider() from every title (movie
         or series) with featured: true, across js/movies.js and js/series.js
         (see getFeaturedTitles() in js/series.js). Add/remove a featured
         title there and the slider updates automatically — nothing here
         to edit. -->
    <section class="hero-slider" data-hero-slider aria-label="Títulos destacados"></section>

    <!-- ==================== CATALOG ROWS ==================== -->
    <!-- Built entirely by Render.buildRow() — one row per distinct
         `categoria` found across the combined catalog (getAllCategories(),
         js/series.js), so each row can mix películas and series. Uses the
         exact same Render.buildRow/createCard as Películas and Series, so
         card sizes, navbar and spacing all match. -->
    <div class="rows" data-rows-mount aria-label="Catálogo por categoría"></div>
  </main>

  <script src="js/movies.js"></script>
  <script src="js/series.js"></script>
  <script src="js/render.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/lista.js"></script>
  <script>
    // Home-page bootstrap: read data, render it, wire interactions.
    // Kept inline since it's a handful of lines specific to this page —
    // see js/detail.js for the equivalent (larger) controller used by
    // pelicula.html.
    document.addEventListener("DOMContentLoaded", () => {
      const mount = document.querySelector("[data-rows-mount]");

      Render.renderHeroSlider(document.querySelector("[data-hero-slider]"), getFeaturedTitles());
      Render.buildRow({ id: "todo", label: "Todo en RUBY", titles: RUBY_ALL_TITLES }, mount);
      getAllCategories().forEach((category) => Render.buildRow(category, mount));

      Interactions.init();
    });
  </script>
</body>
</html>
