<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Películas — RUBY</title>
  <meta name="description" content="Catálogo completo de películas en RUBY, organizado por género." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <a href="#main-content" class="skip-link visually-hidden">Saltar al contenido principal</a>

  <!-- ==================== NAVBAR (same component as index.html) ==================== -->
  <header class="navbar">
    <div class="navbar-inner">
      <a
        href="index.html"
        class="brand"
        data-brand-logo="assets/logo/logo.png"
        aria-label="RUBY, ir al inicio"
      >
        <span class="brand-mark" data-brand-wordmark>RUB<span>Y</span></span>
      </a>

      <nav class="nav-menu" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="peliculas.html" class="is-current">Películas</a>
        <a href="series.html">Series</a>
        <a href="mi-lista.html">Mi Lista</a>
      </nav>

      <div class="navbar-actions">
        <form class="search-form" data-search-form>
          <input
            type="text"
            class="search-input"
            data-search-input
            placeholder="Buscar títulos, géneros…"
            aria-label="Buscar en RUBY"
          />
          <button
            type="button"
            class="search-trigger"
            data-search-trigger
            aria-expanded="false"
            aria-label="Abrir búsqueda"
          >
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.2" y2="16.2" />
            </svg>
          </button>
        </form>

        <div class="profile">
          <button
            type="button"
            class="profile-trigger"
            data-profile-trigger
            aria-expanded="false"
            aria-haspopup="true"
            aria-label="Cuenta de Usuario"
          >
            <span class="profile-avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="12" cy="8.2" r="3.4" />
                <path d="M4.6 19.4c1.15-3.65 3.95-5.7 7.4-5.7s6.25 2.05 7.4 5.7" />
              </svg>
            </span>
            <span class="profile-caret">&#9662;</span>
          </button>
          <div class="profile-menu" data-profile-menu role="menu">
            <a href="cuenta.html" class="profile-menu-header" role="menuitem">
              <span class="profile-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <circle cx="12" cy="8.2" r="3.4" />
                  <path d="M4.6 19.4c1.15-3.65 3.95-5.7 7.4-5.7s6.25 2.05 7.4 5.7" />
                </svg>
              </span>
              <span class="profile-menu-name">Usuario</span>
            </a>
            <div class="profile-menu-divider"></div>
            <a href="mi-lista.html" role="menuitem">Mi Lista</a>
            <a href="cuenta.html" role="menuitem">Cuenta</a>
            <a href="#" role="menuitem" data-logout>Cerrar sesión</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <!-- ==================== HERO SLIDER ==================== -->
    <!-- Same Render.renderHeroSlider() used on Home — built from every
         movie in js/movies.js with featured: true. -->
    <section class="hero-slider" data-hero-slider aria-label="Películas destacadas"></section>

    <!-- ==================== CATALOG ROWS ==================== -->
    <!-- Built entirely by Render.renderCategoryRows() — one row per
         distinct `categoria` found in js/movies.js. Series never appear
         here: this page only ever reads from RUBY_MOVIES. -->
    <div class="rows" data-rows-mount aria-label="Catálogo de películas por género"></div>
  </main>

  <script src="js/movies.js"></script>
  <script src="js/render.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/lista.js"></script>
  <script>
    // Películas bootstrap: identical pattern to index.html's, reading
    // only from RUBY_MOVIES — nothing series-related is ever touched here.
    document.addEventListener("DOMContentLoaded", () => {
      Render.renderHeroSlider(document.querySelector("[data-hero-slider]"));
      Render.renderAllMoviesRow(document.querySelector("[data-rows-mount]"));
      Render.renderCategoryRows(document.querySelector("[data-rows-mount]"));
      Interactions.init();
    });
  </script>
</body>
</html>
