<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Series — RUBY</title>
  <meta name="description" content="Catálogo completo de series en RUBY, organizado por género." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <a href="#main-content" class="skip-link visually-hidden">Saltar al contenido principal</a>

  <!-- ==================== NAVBAR (same component as index.html) ==================== -->
  <header class="navbar">
    <div class="navbar-inner">
      <a
        href="index.html"
        class="brand"
        data-brand-logo="assets/logo/logo.png"
        aria-label="RUBY, ir al inicio"
      >
        <span class="brand-mark" data-brand-wordmark>RUB<span>Y</span></span>
      </a>

      <nav class="nav-menu" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="peliculas.html">Películas</a>
        <a href="series.html" class="is-current">Series</a>
        <a href="documentales.html">Documentales</a>
        <a href="mi-lista.html">Mi Lista</a>
      </nav>

      <div class="navbar-actions">
        <form class="search-form" data-search-form>
          <input
            type="text"
            class="search-input"
            data-search-input
            placeholder="Buscar títulos, géneros…"
            aria-label="Buscar en RUBY"
          />
          <button
            type="button"
            class="search-trigger"
            data-search-trigger
            aria-expanded="false"
            aria-label="Abrir búsqueda"
          >
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.2" y2="16.2" />
            </svg>
          </button>
        </form>

        <div class="profile">
          <button
            type="button"
            class="profile-trigger"
            data-profile-trigger
            aria-expanded="false"
            aria-haspopup="true"
          >
            <span class="profile-avatar">A</span>
            <span class="profile-caret">&#9662;</span>
          </button>
          <div class="profile-menu" data-profile-menu role="menu">
            <a href="#" role="menuitem">Antonella</a>
            <div class="profile-menu-divider"></div>
            <a href="mi-lista.html" role="menuitem">Mi Lista</a>
            <a href="#" role="menuitem">Cuenta</a>
            <a href="#" role="menuitem">Cerrar sesión</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div class="catalog-header">
      <p class="catalog-header__eyebrow">Catálogo</p>
      <h1 class="catalog-header__title">Series</h1>
      <p class="catalog-header__text">
        Todas las series de RUBY, organizadas automáticamente por género.
      </p>
    </div>

    <!-- ==================== CATALOG ROWS ==================== -->
    <!-- One row per distinct `categoria` in js/series.js, built with the
         exact same Render.buildRow used for películas — no separate
         rendering logic lives here. -->
    <div class="rows rows--flat" data-rows-mount aria-label="Catálogo de series por género"></div>
  </main>

  <script src="js/movies.js"></script>
  <script src="js/series.js"></script>
  <script src="js/render.js"></script>
  <script src="js/interactions.js"></script>
  <script>
    // Series bootstrap: builds one row per series category via the same
    // Render.buildRow used everywhere else — this page only supplies
    // getSeriesCategories() as the data source, no new render code.
    document.addEventListener("DOMContentLoaded", () => {
      const mount = document.querySelector("[data-rows-mount]");
      getSeriesCategories().forEach((category) => Render.buildRow(category, mount));
      Interactions.init();
    });
  </script>
</body>
</html>
